name: glm-z1-32b
display_name: "GLM-Z1 32B Thinking"
family: glm
version: "z1"
description: "THUDM's GLM-Z1 32B — chain-of-thought reasoning model in the GLM family."
hf_model_id: "THUDM/GLM-Z1-32B-0414"
serving:
  engine: vllm
  tensor_parallel: 2
  context_length: 32768
  max_model_len: 32768
  dtype: auto
  gpu_memory_utilization: 0.90
  extra_args:
    - "--trust-remote-code"
gpus:
  recommended: ["A100:2", "A100-80GB:1", "H100:1"]
  minimum: ["A100:2"]
  fallback: ["A10G:4"]
memory_gb: 65
disk_gb: 80
startup_time_seconds: 200
requires_hf_token: false
capabilities:
  - chat
  - text-generation
  - reasoning
  - code-generation
tags:
  - glm
  - thudm
  - reasoning
  - thinking
  - chinese
