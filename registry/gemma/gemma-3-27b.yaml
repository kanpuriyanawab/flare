name: gemma-3-27b
display_name: "Gemma 3 27B Instruct"
family: gemma
version: "3"
description: "Google's Gemma 3 27B — flagship Gemma with excellent multimodal and reasoning."
hf_model_id: "google/gemma-3-27b-it"
serving:
  engine: vllm
  tensor_parallel: 2
  context_length: 8192
  max_model_len: 8192
  dtype: auto
  gpu_memory_utilization: 0.90
gpus:
  recommended: ["A100:2", "A100-80GB:1", "H100:1"]
  minimum: ["A100:2"]
  fallback: ["A10G:4"]
memory_gb: 56
disk_gb: 80
startup_time_seconds: 180
requires_hf_token: true
capabilities:
  - chat
  - text-generation
  - vision
  - reasoning
  - code-generation
tags:
  - gemma
  - google
  - multimodal
  - large
