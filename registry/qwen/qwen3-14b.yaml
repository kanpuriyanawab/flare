name: qwen3-14b
display_name: "Qwen3 14B Instruct"
family: qwen
version: "3"
description: "Alibaba's Qwen3 14B — strong mid-size model with thinking mode."
hf_model_id: "Qwen/Qwen3-14B"
serving:
  engine: vllm
  tensor_parallel: 1
  context_length: 32768
  max_model_len: 32768
  dtype: auto
  gpu_memory_utilization: 0.90
  extra_args:
    - "--enable-reasoning"
    - "--reasoning-parser qwen3"
gpus:
  recommended: ["A10G:1", "A100:1", "L4:2"]
  minimum: ["A10G:1"]
  fallback: ["A100:1"]
memory_gb: 30
disk_gb: 60
startup_time_seconds: 150
requires_hf_token: false
capabilities:
  - chat
  - text-generation
  - reasoning
  - function-calling
  - code-generation
tags:
  - qwen
  - alibaba
  - reasoning
  - multilingual
