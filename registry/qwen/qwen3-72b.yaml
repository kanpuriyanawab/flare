name: qwen3-72b
display_name: "Qwen3 72B Instruct"
family: qwen
version: "3"
description: "Alibaba's Qwen3 72B — flagship model with state-of-the-art reasoning."
hf_model_id: "Qwen/Qwen3-72B"
serving:
  engine: vllm
  tensor_parallel: 4
  context_length: 32768
  max_model_len: 32768
  dtype: auto
  gpu_memory_utilization: 0.90
  extra_args:
    - "--enable-reasoning"
    - "--reasoning-parser qwen3"
gpus:
  recommended: ["A100:4", "H100:4", "A100-80GB:2"]
  minimum: ["A100:4"]
  fallback: ["A10G:8"]
memory_gb: 160
disk_gb: 200
startup_time_seconds: 300
requires_hf_token: false
capabilities:
  - chat
  - text-generation
  - reasoning
  - function-calling
  - code-generation
tags:
  - qwen
  - alibaba
  - reasoning
  - multilingual
  - flagship
