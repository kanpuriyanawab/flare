name: qwen3-32b
display_name: "Qwen3 32B Instruct"
family: qwen
version: "3"
description: "Alibaba's Qwen3 32B — large model with powerful reasoning and tool use."
hf_model_id: "Qwen/Qwen3-32B"
serving:
  engine: vllm
  tensor_parallel: 2
  context_length: 32768
  max_model_len: 32768
  dtype: auto
  gpu_memory_utilization: 0.90
  extra_args:
    - "--enable-reasoning"
    - "--reasoning-parser qwen3"
gpus:
  recommended: ["A100:2", "A100-80GB:1", "H100:1"]
  minimum: ["A100:2"]
  fallback: ["A10G:4"]
memory_gb: 65
disk_gb: 80
startup_time_seconds: 200
requires_hf_token: false
capabilities:
  - chat
  - text-generation
  - reasoning
  - function-calling
  - code-generation
tags:
  - qwen
  - alibaba
  - reasoning
  - multilingual
  - large
