name: gpt-oss-20b
display_name: "GPT-OSS 20B"
family: gpt-oss
version: "20b"
description: "OpenAI's open-source GPT model (20B). Requires special vLLM build with gpt-oss support."
hf_model_id: "openai/gpt-oss-20b"
serving:
  engine: vllm
  tensor_parallel: 1
  context_length: 8192
  max_model_len: 8192
  dtype: auto
  gpu_memory_utilization: 0.90
  extra_args:
    - "--trust-remote-code"
gpus:
  recommended: ["H100:1", "H200:1"]
  minimum: ["H100:1"]
  fallback: ["A100-80GB:1"]
memory_gb: 45
disk_gb: 80
startup_time_seconds: 180
requires_hf_token: true
capabilities:
  - chat
  - text-generation
  - function-calling
  - reasoning
tags:
  - openai
  - gpt-oss
  - latest
